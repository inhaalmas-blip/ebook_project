<!DOCTYPE html>
<html>
<head>
    <title>AI eBook Platform</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            color: white;
        }
        h1 {
            margin-top: 30px;
        }
        form {
            margin: 20px;
        }
        select, button {
            padding: 10px;
            font-size: 16px;
            border-radius: 5px;
            border: none;
        }
        button {
            background-color: #333;
            color: white;
            cursor: pointer;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li {
            background: white;
            color: black;
            margin: 10px auto;
            padding: 15px;
            width: 300px;
            border-radius: 10px;
        }
        a {
            text-decoration: none;
            color: blue;
        }
    </style>
</head>
<body>

    <h1>📚 AI eBook Recommendation System</h1>

    <form method="post">
        <select name="subject">
            <option value="python">Python</option>
            <option value="java">Java</option>
            <option value="math">Math</option>
            <option value="science">Science</option>
            <option value="gk">GK</option>
            <option value="ai">AI</option>
            <option value="web">Web Development</option>
        </select>
        <button type="submit">Search</button>
    </form>

    <h2>Recommended Books:</h2>

    <ul>
        {% for book in books %}
        <li>
            <b>{{ book.title }}</b><br>
            Subject: {{ book.subject }}<br>
            Level: {{ book.level }}<br><br>
            <a href="{{ book.link }}" target="_blank">📖 Read Now</a>
        </li>
        {% endfor %}
    </ul>

    {% if books|length == 0 %}
    <p>No books found</p>
    {% endif %}

</body>
</html>
