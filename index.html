<!DOCTYPE html>
<html>
<head>
    <title>AI eBook Platform</title>
</head>
<body>

    <h1>📚 AI eBook Recommendation System</h1>

    <form method="post">
        <input type="text" name="subject" placeholder="Enter subject (python, math)">
        <button type="submit">Search</button>
    </form>

    <h2>Recommended Books:</h2>

    <ul>
        {% for book in books %}
        <li>
            {{ book.title }} 
            <a href="{{ book.link }}" target="_blank">Read</a>
        </li>
        {% endfor %}
    </ul>

</body>
</html>
